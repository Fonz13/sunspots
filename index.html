<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR Sun Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Setup Overlay (for permissions) -->
    <div id="setup-screen" class="fs-container setup-bg">
        <div class="glass-panel setup-panel">
            <div class="sun-icon">☀️</div>
            <h1>AR Sun Tracker</h1>
            <p>Track the exact trajectory of the sun across the sky for any day of the year using augmented reality.</p>
            <div class="permissions-list">
                <div class="perm-item"><span>📷</span> Camera access required</div>
                <div class="perm-item"><span>🧭</span> Compass/Motion access required</div>
                <div class="perm-item"><span>📍</span> Location access required</div>
            </div>
            <button id="start-btn" class="glow-btn">Start AR Experience</button>
            <p id="setup-error" class="error-msg"></p>
        </div>
    </div>

    <!-- Main AR Interface -->
    <div id="ar-container" class="fs-container" style="display: none;">
        <!-- Camera Background -->
        <video id="camera-bg" autoplay playsinline></video>

        <!-- AR Canvas Overlay -->
        <canvas id="ar-canvas"></canvas>

        <!-- Google Street View Container -->
        <div id="street-view" style="display: none;"></div>

        <!-- UI Overlay -->
        <div class="ui-overlay">
            <div class="top-bar">
                <div class="mode-toggle glass-pill">
                    <button id="ar-mode-btn" class="active">📷 AR</button>
                    <button id="sv-mode-btn">🗺️ Street</button>
                </div>
                <div class="search-container" id="search-container" style="display: none;">
                    <input type="text" id="location-input" placeholder="Search location..." class="glass-pill" />
                </div>
                <div class="date-picker-container">
                    <input type="date" id="date-picker" />
                </div>
                <button id="info-btn" class="glass-panel icon-btn">⚙️</button>
            </div>

            <!-- Telemetry & Calibration Modal -->
            <div id="info-modal" class="glass-panel info-modal" style="display: none;">
                <div class="info-header">
                    <span class="info-title">Information</span>
                    <button id="close-info-btn" class="close-btn">✖</button>
                </div>
                <div class="info-body">
                    <div class="info-row">
                        <span class="label">Elevation</span>
                        <span id="current-elevation" class="value">--°</span>
                    </div>
                    <div class="info-row">
                        <span class="label">Azimuth</span>
                        <span id="current-azimuth" class="value">--°</span>
                    </div>
                    <div class="info-row">
                        <span class="label">Timezone</span>
                        <span id="current-timezone" class="value">--</span>
                    </div>
                    <hr style="border: 1px solid rgba(255,255,255,0.2); margin: 15px 0;">
                    <div class="control-row">
                        <label>Camera FOV: <span id="fov-display">65</span>°</label>
                        <input type="range" id="fov-slider" min="40" max="100" value="65" style="width: 100%;">
                    </div>
                    <div class="control-row" style="margin-top: 15px;">
                        <label>Compass Offset: <span id="compass-display">0</span>°</label>
                        <input type="range" id="compass-slider" min="-90" max="90" value="0" style="width: 100%;">
                    </div>
                    <div style="text-align: center; margin-top: 20px;">
                        <button id="reset-calibration-btn" style="background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer;">Reset Defaults</button>
                    </div>
                </div>
            </div>

            <div class="status-panel">
                <div class="glass-pill">
                    <span id="status-indicator" class="dot loading"></span>
                    <span id="status-msg">Initializing Sensors...</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?v=weekly&libraries=places"></script>
    <script type="module" src="app.js"></script>
</body>

</html>
